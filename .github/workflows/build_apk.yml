name: Build TVBox APK

on:
  push:
    branches:
      - master
      - genspark_ai_developer
  workflow_dispatch:
    inputs:
      variant:
        description: '编译变体'
        required: false
        default: 'arm64-java'
        type: choice
        options:
          - arm64-java
          - armeabi-java
          - arm64-python
          - all
      build_type:
        description: '构建类型'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "TVBox APK"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: genspark_ai_developer

      - name: Verify project structure
        run: |
          ls -la
          for f in gradlew app/build.gradle build.gradle settings.gradle gradle/wrapper/gradle-wrapper.properties; do
            test -f "$f" && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/platforms
            ${{ env.ANDROID_SDK_ROOT }}/build-tools
          key: android-sdk-34-${{ runner.os }}

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" --channel=0 2>&1 | tail -3

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        run: pip install lxml ujson pyquery requests jsonpath cachetools pycryptodome beautifulsoup4

      - name: Patch Gradle wrapper URL
        run: |
          FILE="gradle/wrapper/gradle-wrapper.properties"
          sed -i 's|https://mirrors.cloud.tencent.com/gradle/|https://services.gradle.org/distributions/|g' "$FILE"
          sed -i 's|https://downloads.gradle-dn.com/distributions/|https://services.gradle.org/distributions/|g' "$FILE"
          grep distributionUrl "$FILE"

      - name: Patch pyramid build.gradle
        run: |
          if [ -f pyramid/build.gradle ]; then
            sed -i '/buildPython.*python\.exe/d' pyramid/build.gradle
          fi

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Configure APK signing
        env:
          SECRET_KS_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          SECRET_KS_PASS: ${{ secrets.RELEASE_STORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SECRET_KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$SECRET_KS_B64" ]; then
            echo "$SECRET_KS_B64" | base64 -d > app/release.jks
            SF="./release.jks"; SP="$SECRET_KS_PASS"; KA="$SECRET_KEY_ALIAS"; KP="$SECRET_KEY_PASS"
          else
            cp -f .github/workflows/TVBoxOSC.jks app/TVBoxOSC.jks
            SF="./TVBoxOSC.jks"; SP="TVBoxOSC"; KA="TVBoxOSC"; KP="TVBoxOSC"
          fi
          printf '\nRELEASE_STORE_FILE=%s\nRELEASE_STORE_PASSWORD=%s\nRELEASE_KEY_ALIAS=%s\nRELEASE_KEY_PASSWORD=%s\n' \
            "$SF" "$SP" "$KA" "$KP" >> gradle.properties
          python3 -c "
          import sys
          sf,sp,ka,kp=sys.argv[1],sys.argv[2],sys.argv[3],sys.argv[4]
          signing=('    signingConfigs {\n        myConfig {\n'
              '            storeFile file(\"'+sf+'\")\n'
              '            storePassword \"'+sp+'\"\n'
              '            keyAlias \"'+ka+'\"\n'
              '            keyPassword \"'+kp+'\"\n'
              '            v1SigningEnabled true\n            v2SigningEnabled true\n        }\n    }\n')
          with open('app/build.gradle') as f: txt=f.read()
          if 'signingConfigs' not in txt:
              txt=txt.replace('android {','android {\n'+signing,1)
              txt=txt.replace('release {','release {\n            signingConfig signingConfigs.myConfig',1)
              open('app/build.gradle','w').write(txt); print('Signing injected.')
          else: print('Already present.')
          " "$SF" "$SP" "$KA" "$KP"

      # ▼ 关键修复：push触发时inputs为空，必须用硬编码默认值
      - name: Resolve build tasks
        id: tasks
        run: |
          VARIANT="${{ inputs.variant }}"
          TYPE="${{ inputs.build_type }}"
          [ -z "$VARIANT" ] && VARIANT="arm64-java"
          [ -z "$TYPE" ] && TYPE="debug"
          CAP="$(printf '%s' "${TYPE:0:1}" | tr 'a-z' 'A-Z')${TYPE:1}"
          case "$VARIANT" in
            arm64-java)   TASKS="assembleArm64GenericNormal${CAP}";   DESC="arm64-v8a/Java/${TYPE}";;
            armeabi-java) TASKS="assembleArmeabiGenericNormal${CAP}"; DESC="armeabi-v7a/Java/${TYPE}";;
            arm64-python) TASKS="assembleArm64GenericPython${CAP}";   DESC="arm64-v8a/Python/${TYPE}";;
            all)          TASKS="assembleArm64GenericNormal${CAP} assembleArmeabiGenericNormal${CAP}"; DESC="all/Java/${TYPE}";;
            *)            TASKS="assembleArm64GenericNormal${CAP}";   DESC="arm64-v8a/Java/${TYPE}";;
          esac
          echo "VARIANT=$VARIANT  TYPE=$TYPE  TASKS=$TASKS"
          echo "tasks=${TASKS}" >> "$GITHUB_OUTPUT"
          echo "desc=${DESC}"   >> "$GITHUB_OUTPUT"
          echo "type=${TYPE}"   >> "$GITHUB_OUTPUT"

      - name: Verify tasks output
        run: |
          echo "tasks='${{ steps.tasks.outputs.tasks }}'"
          [ -z "${{ steps.tasks.outputs.tasks }}" ] && { echo "ERROR: tasks is empty!"; exit 1; } || echo "OK"

      - name: Clean AndServer incremental cache
        run: rm -rf app/build/intermediates/merged_assets app/build/tmp || true

      # ▼ 关键修复：set -o pipefail 保留 Gradle 真实退出码
      - name: Build APK
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx2g"
        run: |
          set -o pipefail
          chmod +x gradlew
          echo ">>> Task: ${{ steps.tasks.outputs.tasks }}"
          ./gradlew ${{ steps.tasks.outputs.tasks }} \
            --build-cache --parallel --no-daemon --stacktrace -x lint \
            2>&1 | tee build.log

      # ▼ 关键修复：if:always() 确保失败时也搜索，方便调试
      - name: Collect APK files
        if: always()
        run: |
          echo "=== All build outputs ==="
          find app/build/outputs -type f 2>/dev/null | head -20 || echo "(no outputs)"
          mkdir -p output/apk
          COUNT=0
          while IFS= read -r f; do
            cp "$f" output/apk/
            echo "Collected: $(basename $f)"
            COUNT=$((COUNT+1))
          done < <(find app/build/outputs -name "*.apk" 2>/dev/null)
          echo "APK_COUNT=$COUNT" >> "$GITHUB_ENV"
          echo "Total: $COUNT APK(s)"

      - name: Build summary
        if: always()
        run: |
          {
            echo "## TVBox APK 编译结果"
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 分支 | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${GITHUB_SHA:0:7}\` |"
            echo "| 变体 | ${{ steps.tasks.outputs.desc }} |"
            echo "| Task | \`${{ steps.tasks.outputs.tasks }}\` |"
            echo "| JDK | 17 Temurin |"
            echo ""
            if ls output/apk/*.apk 1>/dev/null 2>&1; then
              echo "### ✅ APK 文件"
              for f in output/apk/*.apk; do echo "- \`$(basename $f)\` ($(du -sh $f|cut -f1))"; done
            else
              echo "### ❌ 未生成 APK，请下载 build-log Artifact 查看详细错误"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: env.APK_COUNT != '0'
        with:
          name: TVBox-APK-run${{ github.run_number }}
          path: output/apk/*.apk
          retention-days: 30
          compression-level: 0

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-run${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 7

  clean:
    name: Clean old runs
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 14
          keep_minimum_runs: 5
