name: Build TVBox APK

on:
  push:
    branches:
      - master
      - genspark_ai_developer
    paths:
      - 'tvbox_source/**'
      - '.github/workflows/build_apk.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'tvbox_source/**'
  workflow_dispatch:
    inputs:
      variant:
        description: '编译变体'
        required: false
        default: 'arm64-java'
        type: choice
        options:
          - arm64-java
          - armeabi-java
          - arm64-python
          - all
      build_type:
        description: '构建类型'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      sign_apk:
        description: '是否签名 APK'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "TVBox APK (${{ inputs.variant || 'arm64-java' }} / ${{ inputs.build_type || 'debug' }})"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tvbox_source

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('tvbox_source/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wrapper-

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/configuration-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('tvbox_source/**/*.gradle*', 'tvbox_source/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Android SDK platforms
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/platforms
          key: android-platforms-34-${{ runner.os }}

      - name: Cache Android build-tools
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/build-tools
          key: android-build-tools-34-${{ runner.os }}

      - name: Set up Android SDK
        working-directory: ${{ github.workspace }}
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" --channel=0 2>&1 | tail -3

      # ← 修复点：去掉 cache: 'pip'，避免找不到 requirements.txt 报错
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        working-directory: ${{ github.workspace }}
        run: pip install lxml ujson pyquery requests jsonpath cachetools pycryptodome beautifulsoup4

      - name: Patch Gradle wrapper URL
        run: |
          sed -i 's|https://mirrors.cloud.tencent.com/gradle/|https://services.gradle.org/distributions/|g' gradle/wrapper/gradle-wrapper.properties
          sed -i 's|https://downloads.gradle-dn.com/distributions/|https://services.gradle.org/distributions/|g' gradle/wrapper/gradle-wrapper.properties
          grep distributionUrl gradle/wrapper/gradle-wrapper.properties

      - name: Patch pyramid build.gradle
        run: |
          if [ -f pyramid/build.gradle ]; then
            sed -i '/buildPython.*python\.exe/d' pyramid/build.gradle
          fi

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Configure APK signing
        env:
          SECRET_KS_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          SECRET_KS_PASS: ${{ secrets.RELEASE_STORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SECRET_KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$SECRET_KS_B64" ]; then
            echo "$SECRET_KS_B64" | base64 -d > app/release.jks
            STORE_FILE="./release.jks"
            STORE_PASS="$SECRET_KS_PASS"
            KEY_ALIAS="$SECRET_KEY_ALIAS"
            KEY_PASS="$SECRET_KEY_PASS"
          else
            cp -f ../.github/workflows/TVBoxOSC.jks app/TVBoxOSC.jks
            STORE_FILE="./TVBoxOSC.jks"
            STORE_PASS="TVBoxOSC"
            KEY_ALIAS="TVBoxOSC"
            KEY_PASS="TVBoxOSC"
          fi

          printf '\nRELEASE_STORE_FILE=%s\n'     "$STORE_FILE" >> gradle.properties
          printf 'RELEASE_STORE_PASSWORD=%s\n'   "$STORE_PASS" >> gradle.properties
          printf 'RELEASE_KEY_ALIAS=%s\n'        "$KEY_ALIAS"  >> gradle.properties
          printf 'RELEASE_KEY_PASSWORD=%s\n'     "$KEY_PASS"   >> gradle.properties

          python3 -c "
          import sys
          store_file = sys.argv[1]
          store_pass = sys.argv[2]
          key_alias  = sys.argv[3]
          key_pass   = sys.argv[4]
          signing = (
              '    signingConfigs {\n'
              '        myConfig {\n'
              '            storeFile file(\"' + store_file + '\")\n'
              '            storePassword \"' + store_pass + '\"\n'
              '            keyAlias \"'    + key_alias  + '\"\n'
              '            keyPassword \"' + key_pass   + '\"\n'
              '            v1SigningEnabled true\n'
              '            v2SigningEnabled true\n'
              '        }\n'
              '    }\n'
          )
          with open('app/build.gradle') as f:
              txt = f.read()
          if 'signingConfigs' not in txt:
              txt = txt.replace('android {', 'android {\n' + signing, 1)
              txt = txt.replace('release {', 'release {\n            signingConfig signingConfigs.myConfig', 1)
              with open('app/build.gradle', 'w') as f:
                  f.write(txt)
              print('Signing injected.')
          else:
              print('signingConfigs already present.')
          " "$STORE_FILE" "$STORE_PASS" "$KEY_ALIAS" "$KEY_PASS"

      - name: Resolve build tasks
        id: tasks
        run: |
          VARIANT="${{ inputs.variant || 'arm64-java' }}"
          TYPE="${{ inputs.build_type || 'debug' }}"
          CAP="$(echo "${TYPE:0:1}" | tr a-z A-Z)${TYPE:1}"
          case "$VARIANT" in
            arm64-java)    TASKS="assembleArm64GenericNormal${CAP}";   DESC="arm64-v8a/Java/${TYPE}";;
            armeabi-java)  TASKS="assembleArmeabiGenericNormal${CAP}"; DESC="armeabi-v7a/Java/${TYPE}";;
            arm64-python)  TASKS="assembleArm64GenericPython${CAP}";   DESC="arm64-v8a/Python/${TYPE}";;
            all)           TASKS="assembleArm64GenericNormal${CAP} assembleArmeabiGenericNormal${CAP}"; DESC="arm64+armeabi/Java/${TYPE}";;
            *)             TASKS="assembleArm64GenericNormal${CAP}";   DESC="arm64-v8a/Java/${TYPE}";;
          esac
          echo "tasks=$TASKS"     >> "$GITHUB_OUTPUT"
          echo "desc=$DESC"       >> "$GITHUB_OUTPUT"
          echo "build_type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "Task: $TASKS"

      - name: Clean AndServer incremental cache
        run: |
          rm -rf app/build/intermediates/merged_assets || true
          rm -rf app/build/tmp || true

      - name: Build APK
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx2g"
        run: |
          chmod +x gradlew
          ./gradlew ${{ steps.tasks.outputs.tasks }} \
            --build-cache --parallel --no-daemon --stacktrace -x lint \
            2>&1 | tee ../build.log

      - name: Collect APK files
        if: success()
        run: |
          mkdir -p ../output/apk
          COUNT=0
          while IFS= read -r f; do
            cp "$f" ../output/apk/
            echo "Collected: $(basename $f)"
            COUNT=$((COUNT+1))
          done < <(find app/build/outputs/apk -name "*.apk" 2>/dev/null)
          echo "APK_COUNT=$COUNT" >> "$GITHUB_ENV"
          ls -lh ../output/apk/ || true

      - name: Build summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "## TVBox APK 编译结果"
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 分支 | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${GITHUB_SHA:0:7}\` |"
            echo "| 变体 | ${{ steps.tasks.outputs.desc }} |"
            echo "| JDK | 17 Temurin |"
            echo ""
            if ls output/apk/*.apk 1>/dev/null 2>&1; then
              echo "### APK 文件"
              for f in output/apk/*.apk; do
                echo "- \`$(basename $f)\` ($(du -sh $f | cut -f1))"
              done
            else
              echo "### 未生成 APK，请查看编译日志 Artifact"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: success() && env.APK_COUNT != '0'
        with:
          name: TVBox-APK-${{ github.ref_name }}-${{ steps.tasks.outputs.build_type }}-run${{ github.run_number }}
          path: output/apk/*.apk
          retention-days: 30
          compression-level: 0

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-run${{ github.run_number }}
          path: build.log
          retention-days: 7

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        if: |
          success() &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          env.APK_COUNT != '0'
        with:
          tag: "v${{ github.run_number }}"
          name: "TVBox 美化版 Build #${{ github.run_number }}"
          body: |
            ## TVBox UI 美化版自动构建
            - 分支: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - 变体: ${{ steps.tasks.outputs.desc }}
          artifacts: "output/apk/*.apk"
          makeLatest: true

  clean:
    name: Clean old runs
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 14
          keep_minimum_runs: 5
