name: Build TVBox APK

on:
  push:
    branches:
      - master
      - genspark_ai_developer
  workflow_dispatch:
    inputs:
      variant:
        description: '编译变体'
        required: false
        default: 'arm64-java'
        type: choice
        options:
          - arm64-java
          - armeabi-java
          - arm64-python
          - all
      build_type:
        description: '构建类型'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "TVBox APK"
    runs-on: ubuntu-latest

    steps:
      # ── 1. 检出主仓库（genspark_ai_developer 分支，含 app/ 等所有文件）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: genspark_ai_developer

      # ── 2. 从上游获取缺失的 quickjs / pyramid 模块
      #       genspark_ai_developer 分支不含这两个目录，必须从原始仓库克隆
      - name: Fetch missing quickjs and pyramid modules
        run: |
          echo "=== Cloning upstream TVBoxOS for quickjs/pyramid ==="
          git clone --depth=1 https://github.com/q215613905/TVBoxOS.git /tmp/tvboxos_upstream

          echo "=== Copying quickjs module ==="
          if [ -d /tmp/tvboxos_upstream/quickjs ]; then
            cp -r /tmp/tvboxos_upstream/quickjs ./quickjs
            echo "✅ quickjs copied"
          else
            echo "❌ quickjs not found in upstream!"
            exit 1
          fi

          echo "=== Copying pyramid module ==="
          if [ -d /tmp/tvboxos_upstream/pyramid ]; then
            cp -r /tmp/tvboxos_upstream/pyramid ./pyramid
            echo "✅ pyramid copied"
          else
            echo "⚠️ pyramid not found, creating stub..."
            mkdir -p pyramid/src/main
            printf 'plugins { id "com.android.library" }\nandroid {\n  compileSdk 34\n  defaultConfig { minSdkVersion 21; targetSdkVersion 28 }\n  flavorDimensions "abi"\n  productFlavors {\n    armeabi { dimension = "abi"; ndk { abiFilters "armeabi-v7a" } }\n    arm64   { dimension = "abi"; ndk { abiFilters "arm64-v8a"  } }\n  }\n}\n' > pyramid/build.gradle
            printf '<?xml version="1.0" encoding="utf-8"?><manifest package="com.undcover.freedom.pyramid"/>' > pyramid/src/main/AndroidManifest.xml
          fi

          echo "=== Project structure after fetch ==="
          ls -la
          ls quickjs/ | head -5
          ls pyramid/ | head -5

      # ── 3. 验证关键文件
      - name: Verify project structure
        run: |
          for f in gradlew app/build.gradle build.gradle settings.gradle \
                   gradle/wrapper/gradle-wrapper.properties \
                   quickjs/build.gradle pyramid/build.gradle; do
            test -f "$f" && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

      # ── 4. JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 5. 缓存 Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 6. 缓存 Android SDK
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/platforms
            ${{ env.ANDROID_SDK_ROOT }}/build-tools
          key: android-sdk-34-${{ runner.os }}

      # ── 7. Android SDK 许可证
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" --channel=0 2>&1 | tail -5

      # ── 8. Python 3.8
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        run: pip install lxml ujson pyquery requests jsonpath cachetools pycryptodome beautifulsoup4

      # ── 9. 修复 Gradle wrapper URL
      - name: Patch Gradle wrapper URL
        run: |
          FILE="gradle/wrapper/gradle-wrapper.properties"
          sed -i 's|https://mirrors.cloud.tencent.com/gradle/|https://services.gradle.org/distributions/|g' "$FILE"
          sed -i 's|https://downloads.gradle-dn.com/distributions/|https://services.gradle.org/distributions/|g' "$FILE"
          grep distributionUrl "$FILE"

      # ── 10. 修复 pyramid build.gradle
      - name: Patch pyramid build.gradle
        run: |
          if [ -f pyramid/build.gradle ]; then
            sed -i '/buildPython.*python\.exe/d' pyramid/build.gradle
            sed -i '/buildPython.*python3/d' pyramid/build.gradle
            echo "Patched pyramid/build.gradle"
          fi

      # ── 11. 修复 quickjs build.gradle（添加 abi flavorDimensions）
      - name: Patch quickjs build.gradle
        run: |
          if ! grep -q 'flavorDimensions' quickjs/build.gradle; then
            sed -i 's/android {/android {\n    flavorDimensions "abi"\n    productFlavors {\n        armeabi { dimension = "abi"; ndk { abiFilters "armeabi-v7a" } }\n        arm64   { dimension = "abi"; ndk { abiFilters "arm64-v8a"  } }\n    }/' quickjs/build.gradle
            echo "Patched quickjs/build.gradle"
          else
            echo "quickjs already has flavorDimensions"
          fi
          cat quickjs/build.gradle

      # ── 12. 修复 app/build.gradle（添加 missingDimensionStrategy）
      - name: Patch app/build.gradle missingDimensionStrategy
        run: |
          if ! grep -q 'missingDimensionStrategy' app/build.gradle; then
            sed -i '/multiDexEnabled true/a\        missingDimensionStrategy '"'"'brand'"'"', '"'"'generic'"'"'\n        missingDimensionStrategy '"'"'mode'"'"', '"'"'normal'"'"'' app/build.gradle
            echo "Patched app/build.gradle"
          else
            echo "missingDimensionStrategy already present"
          fi
          grep -A2 'multiDexEnabled' app/build.gradle

      # ── 13. local.properties
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # ── 14. 签名配置
      - name: Configure APK signing
        env:
          SECRET_KS_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          SECRET_KS_PASS: ${{ secrets.RELEASE_STORE_PASSWORD }}
          SECRET_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          SECRET_KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$SECRET_KS_B64" ]; then
            echo "$SECRET_KS_B64" | base64 -d > app/release.jks
            SF="./release.jks"; SP="$SECRET_KS_PASS"; KA="$SECRET_KEY_ALIAS"; KP="$SECRET_KEY_PASS"
          else
            cp -f .github/workflows/TVBoxOSC.jks app/TVBoxOSC.jks
            SF="./TVBoxOSC.jks"; SP="TVBoxOSC"; KA="TVBoxOSC"; KP="TVBoxOSC"
          fi
          printf '\nRELEASE_STORE_FILE=%s\nRELEASE_STORE_PASSWORD=%s\nRELEASE_KEY_ALIAS=%s\nRELEASE_KEY_PASSWORD=%s\n' \
            "$SF" "$SP" "$KA" "$KP" >> gradle.properties
          python3 -c "
          import sys
          sf,sp,ka,kp = sys.argv[1],sys.argv[2],sys.argv[3],sys.argv[4]
          lines = [
              '    signingConfigs {',
              '        myConfig {',
              '            storeFile file(\"' + sf + '\")',
              '            storePassword \"' + sp + '\"',
              '            keyAlias \"' + ka + '\"',
              '            keyPassword \"' + kp + '\"',
              '            v1SigningEnabled true',
              '            v2SigningEnabled true',
              '        }',
              '    }',
          ]
          signing = chr(10).join(lines) + chr(10)
          with open('app/build.gradle') as f:
              txt = f.read()
          if 'signingConfigs' not in txt:
              txt = txt.replace('android {', 'android {' + chr(10) + signing, 1)
              txt = txt.replace('release {', 'release {' + chr(10) + '            signingConfig signingConfigs.myConfig', 1)
              open('app/build.gradle','w').write(txt)
              print('Signing injected.')
          else:
              print('Already present.')
          " "$SF" "$SP" "$KA" "$KP"

      # ── 15. 确定编译 Task
      - name: Resolve build tasks
        id: tasks
        run: |
          VARIANT="${{ inputs.variant }}"
          TYPE="${{ inputs.build_type }}"
          [ -z "$VARIANT" ] && VARIANT="arm64-java"
          [ -z "$TYPE" ] && TYPE="debug"
          CAP="$(printf '%s' "${TYPE:0:1}" | tr 'a-z' 'A-Z')${TYPE:1}"
          case "$VARIANT" in
            arm64-java)   TASKS="assembleArm64GenericNormal${CAP}"; DESC="arm64-v8a/Java/${TYPE}";;
            armeabi-java) TASKS="assembleArmeabiGenericNormal${CAP}"; DESC="armeabi-v7a/Java/${TYPE}";;
            arm64-python) TASKS="assembleArm64GenericPython${CAP}"; DESC="arm64-v8a/Python/${TYPE}";;
            all)          TASKS="assembleArm64GenericNormal${CAP} assembleArmeabiGenericNormal${CAP}"; DESC="arm64+armeabi/Java/${TYPE}";;
            *)            TASKS="assembleArm64GenericNormal${CAP}"; DESC="arm64-v8a/Java/${TYPE}";;
          esac
          echo "VARIANT=$VARIANT  TYPE=$TYPE  TASKS=$TASKS"
          echo "tasks=$TASKS" >> "$GITHUB_OUTPUT"
          echo "desc=$DESC"   >> "$GITHUB_OUTPUT"
          echo "type=$TYPE"   >> "$GITHUB_OUTPUT"

      # ── 16. 验证 tasks 非空
      - name: Verify tasks output
        run: |
          echo "tasks: '${{ steps.tasks.outputs.tasks }}'"
          [ -z "${{ steps.tasks.outputs.tasks }}" ] && { echo "ERROR: tasks empty!"; exit 1; } || echo "OK"

      # ── 17. 清理 AndServer 增量缓存
      - name: Clean AndServer incremental cache
        run: rm -rf app/build/intermediates/merged_assets app/build/tmp || true

      # ── 18. Gradle 编译
      - name: Build APK
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options=-Xmx2g"
        run: |
          set -o pipefail
          chmod +x gradlew
          echo ">>> Building: ${{ steps.tasks.outputs.tasks }}"
          ./gradlew ${{ steps.tasks.outputs.tasks }} \
            --build-cache --parallel --no-daemon --stacktrace -x lint \
            2>&1 | tee build.log

      # ── 19. 收集 APK
      - name: Collect APK files
        if: always()
        run: |
          echo "=== Build outputs ==="
          find app/build/outputs -type f 2>/dev/null | head -30 || echo "(no outputs)"
          mkdir -p output/apk
          COUNT=0
          while IFS= read -r f; do
            cp "$f" output/apk/
            echo "Collected: $(basename $f)"
            COUNT=$((COUNT+1))
          done < <(find app/build/outputs -name "*.apk" 2>/dev/null)
          echo "APK_COUNT=$COUNT" >> "$GITHUB_ENV"
          echo "Total APKs: $COUNT"

      # ── 20. 编译摘要
      - name: Build summary
        if: always()
        run: |
          {
            echo "## TVBox APK 编译结果"
            echo "| 项目 | 值 |"
            echo "|------|-----|"
            echo "| 分支 | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${GITHUB_SHA:0:7}\` |"
            echo "| 变体 | ${{ steps.tasks.outputs.desc }} |"
            echo "| Task | \`${{ steps.tasks.outputs.tasks }}\` |"
            echo ""
            if ls output/apk/*.apk 1>/dev/null 2>&1; then
              echo "### ✅ APK 文件"
              for f in output/apk/*.apk; do
                echo "- \`$(basename $f)\` ($(du -sh $f | cut -f1))"
              done
            else
              echo "### ❌ 未生成 APK，请查看 build-log Artifact"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── 21. 上传 APK（30 天）
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: env.APK_COUNT != '0'
        with:
          name: TVBox-APK-run${{ github.run_number }}
          path: output/apk/*.apk
          retention-days: 30
          compression-level: 0

      # ── 22. 上传编译日志（7 天）
      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log-run${{ github.run_number }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 7

  # ── 清理旧运行
  clean:
    name: Clean old runs
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 14
          keep_minimum_runs: 5
